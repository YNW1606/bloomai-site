<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#050B1A"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>
  <!-- Border ring -->
  <rect x="4" y="4" width="504" height="504" rx="105" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.35"/>

  <!-- Three ascending bars (bloom / growth chart) -->
  <rect x="72"  y="298" width="96" height="182" rx="18" fill="url(#g)" opacity="0.85"/>
  <rect x="208" y="192" width="96" height="288" rx="18" fill="url(#g)" opacity="0.92"/>
  <rect x="344" y="80"  width="96" height="400" rx="18" fill="url(#g)"/>

  <!-- Connecting trend dots -->
  <circle cx="120" cy="278" r="20" fill="#00d4ff"/>
  <circle cx="256" cy="172" r="17" fill="#38bdf8" opacity="0.9"/>
  <circle cx="392" cy="60"  r="22" fill="#00d4ff"/>

  <!-- Subtle connecting line -->
  <polyline points="120,278 256,172 392,60"
            fill="none" stroke="rgba(0,212,255,0.4)" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="14,10"/>
</svg>
